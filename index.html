<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رزومه آیدا</title>
    <style>
        * { margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 3px solid #667eea;
            padding-bottom: 20px;
        }
        h1 { color: #333; font-size: 2.5em; margin-bottom: 10px; }
        .contact { color: #666; font-size: 0.95em; }
        .contact a { color: #667eea; text-decoration: none; }
        .section {
            margin-bottom: 30px;
        }
        h2 {
            color: #667eea;
            font-size: 1.5em;
            margin-bottom: 15px;
            border-right: 4px solid #667eea;
            padding-right: 10px;
        }
        .item {
            margin-bottom: 15px;
            padding: 10px 0;
        }
        .item h3 { color: #333; margin-bottom: 5px; }
        .item p { color: #666; line-height: 1.6; }
        ul { margin-right: 20px; }
        li { color: #666; margin-bottom: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>آیدا منجد</h1>
            <div class="contact">
                <p>📱 09123456789 | 📧 aida@email.com | 📍 تهران</p>
                <p><a href="https://github.com/AidaMNejad">GitHub</a> | <a href="https://linkedin.com">LinkedIn</a></p>
            </div>
        </div>

        <div class="section">
            <h2>درباره من</h2>
            <p>متن درباره خودتان رو اینجا بنویسید...</p>
        </div>

        <div class="section">
            <h2>مهارت‌ها</h2>
            <ul>
                <li>برنامه نویسی</li>
                <li>طراحی</li>
                <li>...</li>
            </ul>
        </div>

        <div class="section">
            <h2>تجربه کاری</h2>
            <div class="item">
                <h3>شغل (سال شروع - سال پایان)</h3>
                <p>توضیح کار...</p>
            </div>
        </div>

        <div class="section">
            <h2>تحصیلات</h2>
            <div class="item">
                <h3>مدرک (سال فارغ‌التحصیلی)</h3>
                <p>رشته: ...</p>
            </div>
        </div>
    </div>
</body>
</html>
